<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Decodifica Caso</title>
    <p>QUESTA E' UNA PAGINA RISERVATA<p>
    <a href="./../index.html">Torna alla homepage</a>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Georgia, serif;
  color:#e5e7eb;
}
.container{
  background:#111827;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
  width:320px;
  text-align:center;
}
h1{
  margin-bottom:20px;
  color:#fbbf24;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:6px;
  background:#1f2933;
  color:white;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#fbbf24;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#f59e0b;
}
#output{
  margin-top:15px;
  color:#93c5fd;
}
</style>
</head>
<body>

<div class="container">
  <h1>⚖️ Decodifica Caso</h1>
  <input id="codice" placeholder="Numero caso">
  <button onclick="decodifica()">Decodifica</button>
  <p id="output"></p>
</div>

<script>
function base64urlDecode(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/')
  while(str.length % 4) str += '='
  return atob(str)
}

function decodifica(){
  const codice = document.getElementById('codice').value.trim()
  if(!codice) return
  try{
    const decoded = base64urlDecode(codice)
    const [nome, data] = decoded.split("|")
    const dataFormattata = "20" + data.slice(0,2) + "-" + data.slice(2,4) + "-" + data.slice(4,6)
    document.getElementById('output').innerText =
      "Giudice: " + nome + " | Data: " + dataFormattata
  }catch(e){
    document.getElementById('output').innerText = "Codice non valido"
  }
}
</script>

</body>
</html>
