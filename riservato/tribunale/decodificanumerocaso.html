<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Decodifica Caso</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Georgia, serif;
  color:#e5e7eb;
}
.container{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:340px;
  text-align:center;
}
h1{ color:#fbbf24; }
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}
input{ background:#1f2933; color:white; }
button{ background:#fbbf24; font-weight:bold; cursor:pointer; }
#output{ margin-top:15px; color:#93c5fd; }
</style>
</head>
<body>

<div class="container">
  <h1>⚖️ DECODIFICA</h1>
  <input id="codice" placeholder="CODICE CASO">
  <button onclick="decodifica()">DECODIFICA</button>
  <p id="output"></p>
</div>

<script>
const KEY = "TRIBUNALE2026"

function fromBase36(str){
  let num = BigInt("0x0")
  num = BigInt(parseInt(str,36))
  let bytes = []
  while(num > 0){
    bytes.unshift(Number(num & 255n))
    num = num >> 8n
  }
  return String.fromCharCode(...bytes)
}

function xor(str, key){
  let out = ""
  for(let i=0;i<str.length;i++){
    out += String.fromCharCode(
      str.charCodeAt(i) ^ key.charCodeAt(i % key.length)
    )
  }
  return out
}

function decodifica(){
  const codice = document.getElementById('codice').value.trim().toUpperCase()
  if(!codice) return

  try{
    const decoded = fromBase36(codice)
    const originale = xor(decoded, KEY)

    const [nome, data] = originale.split("|")

    const dataFormattata =
      "20" + data.slice(0,2) + "-" +
      data.slice(2,4) + "-" +
      data.slice(4,6)

    document.getElementById('output').innerText =
      "GIUDICE: " + nome + " | DATA: " + dataFormattata
  }catch(e){
    document.getElementById('output').innerText = "CODICE NON VALIDO"
  }
}
</script>

</body>
</html>
