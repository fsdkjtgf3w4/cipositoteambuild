    const input = document.getElementById('inputReati').value;

    let minP = 0, maxP = 0, minM = 0, maxM = 0, nomi = [];
    let hasArt14 = false;

    db.forEach(item => {
        const regex = new RegExp(item.art.replace('.', '\\.') + '(?![\\w\\-])', 'g');

        if (regex.test(input)) {
            minP += item.minP;
            maxP += item.maxP;
            minM += item.minM;
            maxM += item.maxM;

            nomi.push(`<li><b>${item.art}</b> - ${item.nome}</li>`);

            if (item.art === "Art. 14") hasArt14 = true;
        }
    });

        minP >= 9999 ? "PENA DI MORTE" : `${minP} - ${maxP}`;

        `€ ${minM.toLocaleString()} - ${maxM.toLocaleString()}`;

        nomi.length ? `<ul>${nomi.join('')}</ul>` : "Nessun reato rilevato.";

        hasArt14 ? "block" : "none";
