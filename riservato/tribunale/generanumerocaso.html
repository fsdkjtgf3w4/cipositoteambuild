<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genera Caso</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Georgia, serif;
  color:#e5e7eb;
}
.container{
  background:#111827;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
  width:320px;
  text-align:center;
}
h1{
  margin-bottom:20px;
  color:#fbbf24;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:6px;
  background:#1f2933;
  color:white;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#fbbf24;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#f59e0b;
}
#output{
  margin-top:15px;
  word-break:break-all;
  color:#93c5fd;
}
</style>
</head>
<body>

<div class="container">
  <h1>⚖️ Registro Tribunale</h1>
  <input id="nome" placeholder="Nome giudice">
  <button onclick="genera()">Genera numero caso</button>
  <p id="output"></p>
</div>

<script>
function base64urlEncode(str){
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')
}

function genera(){
  const nome = document.getElementById('nome').value.trim()
  if(!nome) return
  const d = new Date()
  const data = d.getFullYear().toString().slice(2) +
               String(d.getMonth()+1).padStart(2,'0') +
               String(d.getDate()).padStart(2,'0')
  const payload = nome + "|" + data
  const codice = base64urlEncode(payload)
  document.getElementById('output').innerText = codice
}
</script>

</body>
</html>
