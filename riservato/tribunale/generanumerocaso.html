<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genera Caso</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Georgia, serif;
  color:#e5e7eb;
}
.container{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:340px;
  text-align:center;
}
h1{ color:#fbbf24; }
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}
input{ background:#1f2933; color:white; }
button{ background:#fbbf24; font-weight:bold; cursor:pointer; }
#output{ margin-top:15px; color:#93c5fd; word-break:break-all; }
</style>
</head>
<body>

<div class="container">
  <h1>⚖️ REGISTRO</h1>
  <input id="nome" placeholder="NOME GIUDICE">
  <button onclick="genera()">GENERA</button>
  <p id="output"></p>
</div>

<script>
const KEY = "TRIBUNALE2026"

function xor(str, key){
  let out = ""
  for(let i=0;i<str.length;i++){
    out += String.fromCharCode(
      str.charCodeAt(i) ^ key.charCodeAt(i % key.length)
    )
  }
  return out
}

function toBase36(str){
  let num = BigInt(0)
  for(let i=0;i<str.length;i++){
    num = (num << 8n) + BigInt(str.charCodeAt(i))
  }
  return num.toString(36).toUpperCase()
}

function genera(){
  const nome = document.getElementById('nome').value.trim().toUpperCase()
  if(!nome) return

  const d = new Date()
  const data =
    d.getFullYear().toString().slice(2) +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getDate()).padStart(2,'0')

  const payload = nome + "|" + data
  const cifrato = xor(payload, KEY)
  const codice = toBase36(cifrato)

  document.getElementById('output').innerText = codice
}
</script>

</body>
</html>
