<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipoCity - Database Polizia Giudiziaria</title>
    <style>
        :root { --primary: #c0392b; --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 2px solid var(--primary); padding: 20px; box-shadow: 0 0 15px rgba(192, 57, 43, 0.3); }
        
        h1, h2 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid var(--primary); padding-bottom: 10px; }
        
        .search-box { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; font-size: 16px; box-sizing: border-box; }
        
        .crime-list { max-height: 500px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #333; background: #050505; }
        .crime-item { display: flex; align-items: flex-start; padding: 12px; border-bottom: 1px solid #222; transition: 0.2s; }
        .crime-item:hover { background: #111; }
        .crime-item input[type="checkbox"] { margin-right: 15px; transform: scale(1.5); cursor: pointer; margin-top: 5px; }
        
        .crime-details { flex-grow: 1; }
        .art-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; }
        .desc { font-size: 0.85em; color: #999; margin-bottom: 5px; }
        .pena-info { font-size: 0.9em; color: #bbb; font-style: italic; }

        .calculator-panel { position: sticky; bottom: 0; background: var(--card); border: 2px solid var(--primary); padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .resoconto-box { background: #000; padding: 10px; border: 1px solid #444; height: 100px; overflow-y: auto; font-size: 0.8em; grid-column: span 2; }
        .stat-label { font-size: 0.8em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.4em; font-weight: bold; color: #fff; }
        .highlight { color: #f1c40f; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>DIPARTIMENTO DI GIUSTIZIA - CIPOCITY</h1>
    <h2>MODULO ARRESTI E SANZIONI</h2>
    <p>QUESTA E' UNA PAGINA RISERVATA<p>
    <a href="./../index.html">Torna alla homepage</a>

    <input type="text" id="searchBar" class="search-box" placeholder="Cerca Articolo o Reato..." onkeyup="filterCrimes()">

    <div class="crime-list" id="crimeContainer">
        </div>

    <div class="calculator-panel">
        <div class="resoconto-box" id="summaryList">Nessun reato selezionato.</div>
        
        <div>
            <div class="stat-label">Tempo di Reclusione Totale</div>
            <div class="stat-value"><span id="minPena" class="highlight">0</span> - <span id="maxPena" class="highlight">0</span> min</div>
        </div>
        
        <div>
            <div class="stat-label">Sanzione Pecuniaria Totale</div>
            <div class="stat-value">€ <span id="minMulta" class="highlight">0</span> - € <span id="maxMulta" class="highlight">0</span></div>
        </div>
        
        <button onclick="resetAll()" style="grid-column: span 2; padding: 10px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold;">RESET MODULO</button>
    </div>
</div>

    function renderCrimes() {
        const container = document.getElementById('crimeContainer');
        container.innerHTML = database.map((c, index) => `
            <div class="crime-item">
                <input type="checkbox" id="crime-${index}" onchange="calculate()">
                <div class="crime-details">
                    <div class="art-title">${c.art} - ${c.nome}</div>
                    <div class="desc">${c.desc}</div>
                    <div class="pena-info">Pena: ${c.minP}-${c.maxP} min | Multa: €${c.minM}-${c.maxM}</div>
                </div>
            </div>
        `).join('');
    }

    function calculate() {
        let minP = 0, maxP = 0, minM = 0, maxM = 0;
        let selected = [];

        database.forEach((c, index) => {
            if (document.getElementById(`crime-${index}`).checked) {
                minP += c.minP; maxP += c.maxP;
                minM += c.minM; maxM += c.maxM;
                selected.push(c.art);
            }
        });

        document.getElementById('minPena').innerText = minP;
        document.getElementById('maxPena').innerText = maxP;
        document.getElementById('minMulta').innerText = minM.toLocaleString();
        document.getElementById('maxMulta').innerText = maxM.toLocaleString();
        
        document.getElementById('summaryList').innerText = selected.length > 0 
            ? "Reati: " + selected.join(", ") 
            : "Nessun reato selezionato.";
            
        if(minP >= 9999) document.getElementById('minPena').innerText = "MORTE";
    }

    function filterCrimes() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const items = document.querySelectorAll('.crime-item');
        items.forEach((item, index) => {
            const text = database[index].nome.toLowerCase() + database[index].art.toLowerCase();
            item.style.display = text.includes(query) ? 'flex' : 'none';
        });
    }

    function resetAll() {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        calculate();
    }

    renderCrimes();
</script>
